<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
<style>
.mod-box { fill: #e3f2fd; stroke: #1976d2; stroke-width: 1.5; }
.mod-box-circular { fill: #ffcccc; stroke: #ff0000; stroke-width: 2.5; }
.mod-text { font: 12px sans-serif; fill: #111; }
.dep-line { stroke: #555; stroke-width: 1.2; fill: none; }
.dep-circular { stroke: #ff0000; stroke-width: 2; fill: none; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/></marker>
<marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ff0000"/></marker>
</defs>
<line x1="140.0" y1="125.0" x2="140.0" y2="255.0" class="dep-line" marker-end="url(#arrow)"/>
<line x1="140.0" y1="125.0" x2="580.0" y2="255.0" class="dep-line" marker-end="url(#arrow)"/>
<line x1="140.0" y1="125.0" x2="360.0" y2="255.0" class="dep-line" marker-end="url(#arrow)"/>
<line x1="360.0" y1="255.0" x2="140.0" y2="255.0" class="dep-line" marker-end="url(#arrow)"/>
<line x1="360.0" y1="255.0" x2="580.0" y2="255.0" class="dep-line" marker-end="url(#arrow)"/>
<line x1="360.0" y1="125.0" x2="580.0" y2="125.0" class="dep-circular" marker-end="url(#arrow-red)"/>
<line x1="580.0" y1="125.0" x2="360.0" y2="125.0" class="dep-circular" marker-end="url(#arrow-red)"/>
<a href="#example_pkg"><rect x="60" y="100" width="160" height="50" class="mod-box" rx="6"/>
<text x="140.0" y="120" text-anchor="middle" class="mod-text" font-weight="bold">example_pkg</text>
<text x="140.0" y="135" text-anchor="middle" class="mod-text" font-size="10">example_pkg</text>
</a>
