name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,site]"
      - name: Tests + couverture
        run: pytest --cov=gendoc --cov-report=term-missing --cov-fail-under=80

  docs:
    # Vérifie le pipeline de bout en bout sur le package d'exemple :
    # analysable, docs générées, site MkDocs construit.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[site]"
      - name: gendoc check
        run: gendoc check ./example/example_pkg
      - name: gendoc build
        run: gendoc build ./example/example_pkg --site-name "Demo gendoc"
      - name: Upload site
        uses: actions/upload-artifact@v4
        with:
          name: demo-site
          path: site/
          if-no-files-found: error
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    # Démo en ligne : déploie le site d'exemple sur GitHub Pages (main uniquement).
    # Activer Pages : Settings → Pages → Source → GitHub Actions.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [docs, test, lint]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        # enablement: true active Pages (source: GitHub Actions) si ce n'est
        # pas déjà fait — évite le 404 « Ensure GitHub Pages has been enabled »
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
